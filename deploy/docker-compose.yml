name: dail-tech

services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:?Set MYSQL_DATABASE in deploy/.env}
      MYSQL_USER: ${MYSQL_USER:?Set MYSQL_USER in deploy/.env}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in deploy/.env}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in deploy/.env}
    volumes:
      - dail_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    environment:
      ENVIRONMENT: production
      DEBUG: ${DEBUG:-false}
      AUTO_MIGRATE: ${AUTO_MIGRATE:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?Set CORS_ALLOWED_ORIGINS in deploy/.env}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:?Set MYSQL_USER in deploy/.env}:${MYSQL_PASSWORD:?Set MYSQL_PASSWORD in deploy/.env}@mysql:3306/${MYSQL_DATABASE:?Set MYSQL_DATABASE in deploy/.env}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in deploy/.env}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
      SMS_ENABLED: ${SMS_ENABLED:-false}
      SMS_SECRET_ID: ${SMS_SECRET_ID:-}
      SMS_SECRET_KEY: ${SMS_SECRET_KEY:-}
      SMS_SDK_APP_ID: ${SMS_SDK_APP_ID:-}
      SMS_SIGN_NAME: ${SMS_SIGN_NAME:-}
      SMS_TEMPLATE_ID: ${SMS_TEMPLATE_ID:-}
      SMS_REGION: ${SMS_REGION:-ap-guangzhou}
      VERIFICATION_CODE_LENGTH: ${VERIFICATION_CODE_LENGTH:-6}
      VERIFICATION_CODE_EXPIRE_MINUTES: ${VERIFICATION_CODE_EXPIRE_MINUTES:-5}
      VERIFICATION_CODE_RESEND_INTERVAL_SECONDS: ${VERIFICATION_CODE_RESEND_INTERVAL_SECONDS:-60}
      COS_ENABLED: ${COS_ENABLED:-false}
      COS_SECRET_ID: ${COS_SECRET_ID:-}
      COS_SECRET_KEY: ${COS_SECRET_KEY:-}
      COS_REGION: ${COS_REGION:-ap-guangzhou}
      COS_BUCKET: ${COS_BUCKET:-}
      COS_DOMAIN: ${COS_DOMAIN:-}
    depends_on:
      mysql:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/openapi.json', timeout=3)\""]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    ports:
      - "${FRONTEND_HTTP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  dail_mysql_data:
